<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloomAI — Aprendizado Adaptativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #22222e;
      --accent: #7c6af7;
      --accent2: #e56bf0;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1, h2, h3, .heading { font-family: 'Syne', sans-serif; }

    /* Animated gradient background */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,106,247,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(229,107,240,0.08) 0%, transparent 70%);
    }

    /* Bloom level indicators */
    .bloom-bar {
      display: flex; gap: 4px; align-items: flex-end;
    }
    .bloom-bar span {
      display: block; width: 8px; border-radius: 2px;
      background: var(--border);
      transition: background 0.4s;
    }

    /* Glass card */
    .glass {
      background: rgba(19,19,26,0.85);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }

    /* Input styles */
    .inp {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .inp:focus { border-color: var(--accent); }
    .inp::placeholder { color: var(--muted); }

    /* Button */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      width: 100%;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    /* Tab switcher */
    .tab { cursor: pointer; padding: 8px 20px; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); transition: all 0.2s; }
    .tab.active { background: var(--accent); color: #fff; }

    /* Error / success message */
    .msg { font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-top: 8px; }
    .msg.error { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .msg.success { background: rgba(124,106,247,0.1); color: #a5b4fc; border: 1px solid rgba(124,106,247,0.2); }

    /* Bloom level badge */
    .level-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 700;
      padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <!-- ── MAIN WRAPPER ── -->
  <div style="position:relative;z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 24px;">

    <!-- Logo -->
    <div class="fade-up" style="text-align:center; margin-bottom: 40px;">
      <div style="display:inline-flex; align-items:center; gap:10px; margin-bottom:12px;">
        <!-- Bloom pyramid icon -->
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="13" y="2" width="10" height="5" rx="2" fill="#e56bf0" opacity="0.9"/>
          <rect x="9" y="9" width="18" height="5" rx="2" fill="#b07cf8" opacity="0.9"/>
          <rect x="5" y="16" width="26" height="5" rx="2" fill="#7c6af7" opacity="0.9"/>
          <rect x="1" y="23" width="34" height="5" rx="2" fill="#5a52d5" opacity="0.9"/>
          <rect x="5" y="30" width="26" height="4" rx="2" fill="#3d3799" opacity="0.7"/>
        </svg>
        <span class="heading" style="font-size:28px; font-weight:800; letter-spacing:-0.02em; color: var(--text);">Bloom<span style="color:var(--accent);">AI</span></span>
      </div>
      <p style="color:var(--muted); font-size:15px; max-width:340px; line-height:1.5;">
        Aprendizado adaptativo guiado pela Taxonomia de Bloom
      </p>
    </div>

    <!-- Auth Card -->
    <div class="glass fade-up delay-1" style="width:100%; max-width:420px; padding:32px;">

      <!-- Tab switcher -->
      <div style="display:flex; gap:6px; background:rgba(255,255,255,0.03); border-radius:10px; padding:4px; margin-bottom:28px;">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Cadastrar</div>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div style="display:flex; flex-direction:column; gap:14px;">
          <div>
            <label style="font-size:13px; color:var(--muted); display:block; margin-bottom:6px;">Nome de usuário</label>
            <input class="inp" id="login-user" type="text" placeholder="seu_usuario" autocomplete="username" />
          </div>
          <div>
            <label style="font-size:13px; color:var(--muted); display:block; margin-bottom:6px;">Senha</label>
            <input class="inp" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div id="login-msg"></div>
          <button class="btn-primary" onclick="doLogin()">Entrar →</button>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register" style="display:none;">
        <div style="display:flex; flex-direction:column; gap:14px;">
          <div>
            <label style="font-size:13px; color:var(--muted); display:block; margin-bottom:6px;">Nome completo</label>
            <input class="inp" id="reg-name" type="text" placeholder="Gabriel Silva" />
          </div>
          <div>
            <label style="font-size:13px; color:var(--muted); display:block; margin-bottom:6px;">Nome de usuário</label>
            <input class="inp" id="reg-user" type="text" placeholder="gabrielsilva" />
          </div>
          <div>
            <label style="font-size:13px; color:var(--muted); display:block; margin-bottom:6px;">Senha</label>
            <input class="inp" id="reg-pass" type="password" placeholder="mínimo 6 caracteres" />
          </div>
          <div id="reg-msg"></div>
          <button class="btn-primary" onclick="doRegister()">Criar conta →</button>
        </div>
      </div>

      <!-- Divider -->
      <div style="display:flex; align-items:center; gap:12px; margin: 20px 0;">
        <div style="flex:1; height:1px; background:var(--border);"></div>
        <span style="color:var(--muted); font-size:12px;">ou</span>
        <div style="flex:1; height:1px; background:var(--border);"></div>
      </div>

      <!-- Public analytics button -->
      <a href="analytics.html">
        <button class="btn-ghost" style="width:100%;">
          📊 &nbsp;Ver análise pública (sem login)
        </button>
      </a>
    </div>

    <!-- Footer note -->
    <p class="fade-up delay-3" style="color:var(--muted); font-size:12px; margin-top:24px; text-align:center; max-width:380px; line-height:1.6;">
      Baseado em Soares, G.J.S. (2025) — <em>Aprendizado Adaptativo com LLMs: Taxonomia de Bloom</em>
    </p>
  </div>

  <!-- ── DATA LAYER (GitHub Gist as simple DB) ── -->
  <script src="db.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    async function doLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;
      if (!user || !pass) return showMsg('login-msg', 'Preencha todos os campos.', 'error');

      const users = DB.getUsers();
      const found = users.find(u => u.username === user);
      if (!found) return showMsg('login-msg', 'Usuário não encontrado.', 'error');
      if (found.password !== btoa(pass)) return showMsg('login-msg', 'Senha incorreta.', 'error');

      // Save session
      localStorage.setItem('bloom_session', JSON.stringify({ username: user, name: found.name }));
      showMsg('login-msg', 'Bem-vindo(a)! Redirecionando...', 'success');
      setTimeout(() => window.location.href = 'app.html', 900);
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const user = document.getElementById('reg-user').value.trim().toLowerCase().replace(/\s+/g,'');
      const pass = document.getElementById('reg-pass').value;

      if (!name || !user || !pass) return showMsg('reg-msg', 'Preencha todos os campos.', 'error');
      if (pass.length < 6) return showMsg('reg-msg', 'Senha deve ter ao menos 6 caracteres.', 'error');
      if (!/^[a-z0-9_]+$/.test(user)) return showMsg('reg-msg', 'Use apenas letras, números e _ no usuário.', 'error');

      const users = DB.getUsers();
      if (users.find(u => u.username === user)) return showMsg('reg-msg', 'Usuário já existe.', 'error');

      DB.addUser({ username: user, name, password: btoa(pass), createdAt: Date.now() });
      localStorage.setItem('bloom_session', JSON.stringify({ username: user, name }));
      showMsg('reg-msg', 'Conta criada! Redirecionando...', 'success');
      setTimeout(() => window.location.href = 'app.html', 900);
    }
  </script>
</body>
</html>
