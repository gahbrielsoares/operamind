<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --color-orange-soft: #ffb380;
      --color-blue-deep: #0088cc;
      --color-pink-pastel: #ffcade;
      --glass-bg: rgba(255, 255, 255, 0.02);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: #020205; /* Fundo mais denso */
      overflow: hidden;
      position: relative;
    }

    /* SISTEMA DE BOLHAS VIVAS NO FUNDO */
    .bg-bubbles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
      filter: blur(80px); /* Suaviza as formas */
    }

    .bubble {
      position: absolute;
      background: var(--color-orange-soft);
      border-radius: 50%;
      opacity: 0.4;
      animation: floatBubble 5s infinite ease-in-out;
    }

    .bubble:nth-child(1) { width: 400px; height: 400px; left: 10%; top: 20%; background: var(--color-blue-deep); animation-duration: 5s; }
    .bubble:nth-child(2) { width: 300px; height: 300px; right: 15%; bottom: 10%; background: var(--color-pink-pastel); animation-duration: 8s; animation-delay: -5s; }
    .bubble:nth-child(3) { width: 250px; height: 250px; left: 40%; top: 50%; background: var(--color-orange-soft); animation-duration: 12s; animation-delay: -2s; }

    @keyframes floatBubble {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); border-radius: 50% 50% 50% 50%; }
      33% { transform: translate(100px, -50px) scale(1.2) rotate(15deg); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
      66% { transform: translate(-50px, 80px) scale(0.9) rotate(-15deg); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    }

    /* CARD COM BORDAS QUE SE DESINTEGRAM (GLOW) */
    .card {
      width: 100%;
      max-width: 450px;
      padding: 50px;
      background: var(--glass-bg);
      backdrop-filter: blur(45px) saturate(210%);
      -webkit-backdrop-filter: blur(45px) saturate(210%);
      border-radius: 45px;
      
      /* Halo de cor em vez de borda rígida */
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 
        0 0 40px rgba(0, 0, 0, 0.3),
        0 0 80px -10px rgba(155, 48, 255, 0.1), /* Glow sutil violeta */
        0 0 120px -20px rgba(255, 179, 128, 0.05); /* Glow sutil laranja */

      position: relative;
      z-index: 10;
      text-align: center;
      
      /* Centralização */
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* BRANDING OPERAMIND */
    .logo-container {
      margin-bottom: 30px;
      display: inline-block;
      position: relative;
    }
    .logo-main {
      font-weight: 800;
      font-size: 38px;
      color: #fff;
      letter-spacing: -1.5px;
    }
    .logo-dash {
      position: absolute;
      top: -3px;
      left: 2px;
      width: 25px;
      height: 5px;
      background: #ffd700;
      border-radius: 2px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.45);
      font-weight: 300;
      font-size: 16px;
      margin-bottom: 40px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 35px;
    }
    .tab {
      cursor: pointer;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 600;
      letter-spacing: 1.2px;
      transition: all 0.4s ease;
    }
    .tab.active { color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }

    .field {
      text-align: left;
      margin-bottom: 24px;
    }
    .field label {
      display: block;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 9px;
      margin-left: 5px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
    }
    .inp {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      outline: none;
      color: #fff;
      font-size: 16px;
      transition: all 0.4s ease;
    }
    .inp:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--color-blue-deep);
      box-shadow: 0 0 25px rgba(0, 136, 204, 0.2);
    }

    .btn-primary {
      width: 100%;
      padding: 18px;
      background: var(--color-pink-pastel);
      border: none;
      border-radius: 18px;
      color: #222;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      margin-top: 15px;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-primary:hover { transform: translateY(-5px); filter: brightness(1.05); }

    .divider {
      margin: 32px 0;
      display: flex;
      align-items: center;
      color: rgba(255, 255, 255, 0.12);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 0 25px;
    }

    .btn-ghost {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.98);
      border: none;
      border-radius: 18px;
      color: #111;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      transition: all 0.3s;
    }

    .msg { margin-top: 20px; font-size: 14px; border-radius: 12px; padding: 12px; }
    .msg.error { background: rgba(255, 60, 60, 0.1); color: #ff9999; border: 1px solid rgba(255, 60, 60, 0.2); }
    .msg.success { background: rgba(0, 255, 120, 0.1); color: #99ffcc; border: 1px solid rgba(0, 255, 120, 0.2); }

    .footer-note {
      position: absolute;
      bottom: 30px;
      width: 100%;
      z-index: 10;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      line-height: 1.7;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="bg-bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="card">
    <div class="logo-container">
      <div class="logo-dash"></div>
      <div class="logo-main">Operamind</div>
    </div>
    
    <div class="subtitle">Entre na sua conta</div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">ENTRAR</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">CADASTRAR</div>
    </div>

    <div id="form-login">
      <div class="field">
        <label>Usuário</label>
        <input class="inp" id="login-user" type="text" placeholder="seu_usuario" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input class="inp" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div id="login-msg"></div>
      <button class="btn-primary" onclick="doLogin()">Iniciar Missão</button>
    </div>

    <div id="form-register" style="display:none">
      <div class="field">
        <label>Nome Completo</label>
        <input class="inp" id="reg-name" type="text" placeholder="Como devemos te chamar?"/>
      </div>
      <div class="field">
        <label>Usuário Único</label>
        <input class="inp" id="reg-user" type="text" placeholder="usuario_unico"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input class="inp" id="reg-pass" type="password" placeholder="No mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()"/>
      </div>
      <div id="reg-msg"></div>
      <button class="btn-primary" onclick="doRegister()">Criar Agente</button>
    </div>

    <div class="divider">ou</div>
    <a href="analytics.html" style="text-decoration: none;">
      <button class="btn-ghost">📊 Análise Pública — sem login</button>
    </a>
  </div>

  <div class="footer-note">
    Operamind · Baseado em Soares, G.J.S. (2025)<br>
    Adaptive Learning · Bloom's Revised Taxonomy
  </div>

  <script src="db.js"></script>
  <script>
    function switchTab(t){
      document.getElementById('tab-login').classList.toggle('active',t==='login');
      document.getElementById('tab-register').classList.toggle('active',t==='register');
      document.getElementById('form-login').style.display=t==='login'?'block':'none';
      document.getElementById('form-register').style.display=t==='register'?'block':'none';
    }

    function showMsg(id,text,type){
      document.getElementById(id).innerHTML=`<div class="msg ${type}">${text}</div>`;
    }

    function doLogin(){
      const user=document.getElementById('login-user').value.trim();
      const pass=document.getElementById('login-pass').value;
      if(!user||!pass) return showMsg('login-msg','Preencha todos os campos.','error');
      const users=DB.getUsers();
      const found=users.find(u=>u.username===user);
      if(!found) return showMsg('login-msg','Usuário não encontrado.','error');
      if(found.password!==btoa(pass)) return showMsg('login-msg','Senha incorreta.','error');
      localStorage.setItem('bloom_session',JSON.stringify({username:user,name:found.name,blooms:found.blooms||0,xp:found.xp||0}));
      showMsg('login-msg','Bem-vindo(a). Carregando...','success');
      setTimeout(()=>window.location.href='app.html',800);
    }

    function doRegister(){
      const name=document.getElementById('reg-name').value.trim();
      const user=document.getElementById('reg-user').value.trim().toLowerCase().replace(/\s+/g,'');
      const pass=document.getElementById('reg-pass').value;
      if(!name||!user||!pass) return showMsg('reg-msg','Preencha todos os campos.','error');
      if(pass.length<6) return showMsg('reg-msg','Senha deve ter ao menos 6 caracteres.','error');
      if(!/^[a-z0-9_]+$/.test(user)) return showMsg('reg-msg','Use apenas letras, números e _ no usuário.','error');
      const users=DB.getUsers();
      if(users.find(u=>u.username===user)) return showMsg('reg-msg','Usuário já existe.','error');
      DB.addUser({username:user,name,password:btoa(pass),createdAt:Date.now(),blooms:0,xp:0});
      localStorage.setItem('bloom_session',JSON.stringify({username:user,name,blooms:0,xp:0}));
      showMsg('reg-msg','Agente criado! Entrando...','success');
      setTimeout(()=>window.location.href='app.html',800);
    }
  </script>
</body>
</html>
