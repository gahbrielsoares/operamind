<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary-blue: #007aff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #f0f2f5;
      position: relative;
    }

    /* CAMADAS DE COR DE FUNDO (DEGRADÊ SUAVE) */
    .bg-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      filter: blur(100px);
      opacity: 0.6;
    }

    .blob {
      position: absolute;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      animation: moveBlobs 20s infinite alternate;
    }

    .blob-blue { background: #00e5ff; top: -10%; left: -10%; }
    .blob-orange { background: #ff7a1a; bottom: -10%; right: -10%; animation-delay: -5s; }
    .blob-pink { background: #ff2d78; top: 40%; left: 30%; animation-delay: -10s; }

    @keyframes moveBlobs {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.2); }
    }

    /* FEIXES DE LUZ (EFEITO VARREDURA SEM MARCAS) */
    .light-sweep {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    .beam {
      position: absolute;
      width: 1000px;
      height: 400px;
      /* Gradiente radial para não deixar bordas marcadas */
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
      transform: rotate(-35deg);
      pointer-events: none;
    }

    .beam-1 {
      top: -20%;
      left: -150%;
      animation: sweep 12s infinite linear;
    }

    .beam-2 {
      bottom: -10%;
      right: -150%;
      background: radial-gradient(ellipse at center, rgba(255, 200, 150, 0.3) 0%, rgba(255,255,255,0) 60%);
      animation: sweepReverse 15s infinite linear;
    }

    @keyframes sweep {
      0% { left: -150%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { left: 150%; opacity: 0; }
    }

    @keyframes sweepReverse {
      0% { right: -150%; opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { right: 150%; opacity: 0; }
    }

    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* CAIXA CENTRAL MAIS TRANSPARENTE */
    .card {
      background: rgba(255, 255, 255, 0.25); /* Transparência aumentada */
      backdrop-filter: blur(30px) saturate(150%);
      -webkit-backdrop-filter: blur(30px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 35px;
      padding: 48px 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
      text-align: center;
    }

    .logo-main {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .logo-sub {
      font-size: 13px;
      color: #555;
      margin-bottom: 35px;
      font-weight: 500;
      opacity: 0.8;
    }

    .tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.06);
      padding: 4px;
      border-radius: 15px;
      margin-bottom: 30px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      border-radius: 12px;
      transition: 0.3s;
    }

    .tab.active {
      background: #fff;
      color: var(--primary-blue);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .field { text-align: left; margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .inp {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 15px;
      padding: 16px;
      font-size: 15px;
      color: var(--text-main);
      outline: none;
      transition: 0.2s;
    }

    .inp:focus {
      background: #fff;
      border-color: var(--primary-blue);
    }

    .btn-primary {
      width: 100%;
      background: var(--primary-blue);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 8px 20px rgba(0, 122, 255, 0.2);
    }

    .divider {
      margin: 28px 0;
      font-size: 12px;
      color: #777;
      display: flex;
      align-items: center;
    }

    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px;
      background: rgba(0, 0, 0, 0.08); margin: 0 15px;
    }

    .btn-ghost {
      width: 100%;
      background: transparent;
      border: 1.2px solid #000;
      color: #000;
      border-radius: 16px;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s;
    }

    .footer-note {
      margin-top: 32px;
      font-size: 11px;
      color: #666;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  
  <div class="bg-layer">
    <div class="blob blob-blue"></div>
    <div class="blob blob-orange"></div>
    <div class="blob blob-pink"></div>
  </div>

  <div class="light-sweep">
    <div class="beam beam-1"></div>
    <div class="beam beam-2"></div>
  </div>

  <div class="wrapper">
    <div class="card">
      <div class="logo-main">Operamind</div>
      <p class="logo-sub">IA Generativa & Taxonomia de Bloom</p>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Entrar</div>
        <div class="tab" onclick="switchTab('register')">Cadastrar</div>
      </div>

      <div id="form-login">
        <div class="field">
          <label>Usuário</label>
          <input class="inp" id="login-user" type="text" placeholder="seu_usuario">
        </div>
        <div class="field">
          <label>Senha</label>
          <input class="inp" id="login-pass" type="password" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="doLogin()">ACESSAR PLATAFORMA</button>
      </div>

      <div class="divider">ou</div>
      
      <a href="#" class="btn-ghost">
        📊 Ver Análise Pública
      </a>

      <div class="footer-note">
        Operamind · 2026<br>
        Baseado em Soares, G.J.S. (2025)
      </div>
    </div>
  </div>

  <script>
    function switchTab(t){
      // Lógica de troca de abas aqui...
    }
    // Suas funções doLogin e doRegister continuam as mesmas
  </script>
</body>
</html>
