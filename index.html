<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      /* Cores de transição da luz */
      --color-orange: #ff7a1a;
      --color-blue: #00e5ff;
      --color-pink: #ffcada;
      --text-muted: #6e5a6e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: #05050f; /* Fundo base escuro para destacar a luz */
      overflow: hidden;
      position: relative;
    }

    /* 1. O Feixe de Luz Transicional */
    .light-beam {
      position: absolute;
      width: 150vw;
      height: 150vh;
      top: -25%;
      left: -150%;
      background: radial-gradient(circle, var(--color-orange) 0%, var(--color-blue) 30%, var(--color-pink) 60%, transparent 80%);
      filter: blur(100px);
      opacity: 0.6;
      z-index: 1;
      animation: beamMove 12s linear infinite alternate;
    }

    @keyframes beamMove {
      0% { transform: translateX(0) rotate(0deg); filter: hue-rotate(0deg); }
      100% { transform: translateX(100%) rotate(45deg); filter: hue-rotate(90deg); }
    }

    /* 2. Card com Glassmorphism Dinâmico */
    .card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      /* O fundo do card reage levemente à luz de fundo */
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 10;
      text-align: center;
      transition: border-color 1s ease;
    }

    /* 3. Branding Operamind */
    .logo-container {
      margin-bottom: 28px;
      display: inline-block;
      position: relative;
    }
    .logo-text {
      font-weight: 800;
      font-size: 34px;
      color: #fff;
      letter-spacing: -1px;
    }
    .logo-dash {
      position: absolute;
      top: -2px;
      left: 0;
      width: 22px;
      height: 4px;
      background: #ffd700; /* O traço amarelo */
      border-radius: 2px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-weight: 300;
      font-size: 15px;
      margin-bottom: 30px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 28px;
    }
    .tab {
      cursor: pointer;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      transition: all 0.3s;
    }
    .tab.active { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

    /* Inputs e Rótulos (Baixo Contraste) */
    .field {
      text-align: left;
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
      margin-left: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .inp {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      outline: none;
      color: #fff;
      font-size: 14px;
      transition: background 0.3s, border 0.3s;
    }
    .inp:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--color-blue);
    }
    .inp::placeholder { color: rgba(255, 255, 255, 0.2); }

    /* Botões Pastel solicitado */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--color-pink); /* Rosa sorvete */
      border: none;
      border-radius: 16px;
      color: #444;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }

    .divider {
      margin: 24px 0;
      display: flex;
      align-items: center;
      color: rgba(255, 255, 255, 0.2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 15px;
    }

    .btn-google {
      width: 100%;
      padding: 14px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #333;
      font-weight: 600;
      cursor: pointer;
    }

    .footer-text {
      margin-top: 30px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }
    .footer-text b {
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    .msg { margin-top: 15px; font-size: 13px; padding: 10px; border-radius: 8px; }
    .error { background: rgba(255,0,0,0.1); color: #ff8888; }
    .success { background: rgba(0,255,0,0.1); color: #88ff88; }
  </style>
</head>
<body>

  <div class="light-beam"></div>

  <div class="card">
    <div class="logo-container">
      <div class="logo-dash"></div>
      <div class="logo-text">Operamind</div>
    </div>
    
    <div class="subtitle">Entre na sua conta</div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">ENTRAR</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">CADASTRAR</div>
    </div>

    <div id="form-login">
      <div class="field">
        <label>E-mail ou Usuário</label>
        <input type="text" class="inp" id="login-user" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" class="inp" id="login-pass" placeholder="••••••••">
      </div>
      <div id="login-msg"></div>
      <button class="btn-primary" onclick="doLogin()">Iniciar Missão</button>
    </div>

    <div id="form-register" style="display:none">
      <div class="field">
        <label>Nome Completo</label>
        <input type="text" class="inp" id="reg-name" placeholder="Como devemos te chamar?">
      </div>
      <div class="field">
        <label>Usuário</label>
        <input type="text" class="inp" id="reg-user" placeholder="usuario_unico">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" class="inp" id="reg-pass" placeholder="Min. 6 caracteres">
      </div>
      <div id="reg-msg"></div>
      <button class="btn-primary" onclick="doRegister()">Criar Agente</button>
    </div>

    <div class="divider">ou</div>

    <button class="btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" alt="Google">
      Continuar com Google
    </button>

    <div class="footer-text">
      Não tem uma senha? <b onclick="switchTab('register')">Criar agora</b>
    </div>
  </div>

  <script src="db.js"></script>
  <script>
    function switchTab(t){
      document.getElementById('tab-login').classList.toggle('active',t==='login');
      document.getElementById('tab-register').classList.toggle('active',t==='register');
      document.getElementById('form-login').style.display=t==='login'?'block':'none';
      document.getElementById('form-register').style.display=t==='register'?'block':'none';
    }

    function showMsg(id,text,type){
      document.getElementById(id).innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    function doLogin(){
      const user=document.getElementById('login-user').value.trim();
      const pass=document.getElementById('login-pass').value;
      if(!user||!pass) return showMsg('login-msg','Preencha os campos.','error');
      
      const users=DB.getUsers();
      const found=users.find(u=>u.username===user);
      if(!found) return showMsg('login-msg','Usuário não encontrado.','error');
      if(found.password!==btoa(pass)) return showMsg('login-msg','Senha incorreta.','error');
      
      localStorage.setItem('bloom_session',JSON.stringify({username:user,name:found.name}));
      showMsg('login-msg','Bem-vindo(a). Carregando...','success');
      setTimeout(()=>window.location.href='app.html',800);
    }

    function doRegister(){
      const name=document.getElementById('reg-name').value.trim();
      const user=document.getElementById('reg-user').value.trim().toLowerCase();
      const pass=document.getElementById('reg-pass').value;
      if(!name||!user||!pass) return showMsg('reg-msg','Preencha tudo.','error');
      if(pass.length<6) return showMsg('reg-msg','Senha muito curta.','error');
      
      const users=DB.getUsers();
      if(users.find(u=>u.username===user)) return showMsg('reg-msg','Usuário já existe.','error');
      
      DB.addUser({username:user,name,password:btoa(pass),createdAt:Date.now()});
      showMsg('reg-msg','Sucesso! Agora faça o login.','success');
      setTimeout(()=>switchTab('login'), 1000);
    }
  </script>
</body>
</html>
