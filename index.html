<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      /* Paleta conforme diretrizes */
      --bg-orange: #ff5f6d;
      --bg-pink: #ffc371; /* Invertendo para radial vibrante */
      --glass-bg: rgba(255, 182, 193, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
      --text-main: #000000;
      --text-muted: #6e5a6e; /* Cinza-rosado de baixo contraste */
      --input-bg: rgba(255, 255, 255, 0.25);
      --btn-pastel: #ffcada; /* Rosa sorvete de morango */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      /* 1. Fundo Vibrante: Gradiente Radial Profundo */
      background: radial-gradient(circle at center, #ff8e71 0%, #ff0844 100%);
      overflow: hidden;
    }

    /* 2. O Card Glassmorphism Monocromático */
    .card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px) saturate(150%);
      -webkit-backdrop-filter: blur(25px) saturate(150%);
      border-radius: 32px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 10;
      text-align: center;
    }

    /* 3. Logotipo (tns style) */
    .logo-container {
      margin-bottom: 24px;
      position: relative;
      display: inline-block;
    }
    .logo-tns {
      font-weight: 800;
      font-size: 38px;
      color: #000;
      letter-spacing: -1.5px;
      position: relative;
    }
    .logo-dash {
      position: absolute;
      top: -4px;
      left: 2px;
      width: 18px;
      height: 4px;
      background: #ffd700; /* Ícone amarelo acima do 't' */
      border-radius: 2px;
    }

    .subtitle {
      color: var(--text-muted);
      font-weight: 300;
      font-size: 15px;
      margin-bottom: 30px;
    }

    /* Tabs Logic */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
    }
    .tab {
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
      transition: color 0.3s;
    }
    .tab.active { color: #000; }

    /* 4. Inputs e Labels */
    .field {
      text-align: left;
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      margin-left: 4px;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .inp {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      outline: none;
      color: #333;
      font-size: 14px;
      transition: all 0.3s;
    }
    .inp::placeholder { color: rgba(0,0,0,0.2); }
    .eye-icon {
      position: absolute;
      right: 15px;
      cursor: pointer;
      opacity: 0.4;
    }

    /* Botão "Entrar" */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--btn-pastel);
      border: none;
      border-radius: 14px;
      color: #555;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; transform: scale(0.99); }

    .divider {
      margin: 20px 0;
      display: flex;
      align-items: center;
      color: rgba(0,0,0,0.15);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.08);
      margin: 0 10px;
    }

    /* Botão Google */
    .btn-google {
      width: 100%;
      padding: 12px;
      background: var(--btn-pastel);
      border: none;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #555;
      font-weight: 600;
      cursor: pointer;
    }

    /* 5. Rodapé */
    .footer-text {
      margin-top: 25px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .footer-text b {
      color: #000;
      cursor: pointer;
    }

    .msg { margin-top: 10px; font-size: 12px; }
    .error { color: #d00; }
    .success { color: #008000; }

  </style>
</head>
<body>

  <div class="card">
    <div class="logo-container">
      <div class="logo-dash"></div>
      <div class="logo-tns">tns</div>
    </div>
    
    <div class="subtitle">Entre na sua conta</div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Cadastro</div>
    </div>

    <div id="form-login">
      <div class="field">
        <label>E-mail</label>
        <input type="text" class="inp" id="login-user" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="input-wrapper">
          <input type="password" class="inp" id="login-pass" placeholder="........">
          <span class="eye-icon">👁️</span>
        </div>
      </div>
      <div id="login-msg"></div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
    </div>

    <div id="form-register" style="display:none">
      <div class="field">
        <label>Nome</label>
        <input type="text" class="inp" id="reg-name" placeholder="Nome Completo">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="text" class="inp" id="reg-user" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" class="inp" id="reg-pass" placeholder="No mínimo 6 caracteres">
      </div>
      <div id="reg-msg"></div>
      <button class="btn-primary" onclick="doRegister()">Criar Conta</button>
    </div>

    <div class="divider">ou</div>

    <button class="btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" alt="Google">
      Continuar com Google
    </button>

    <div class="footer-text">
      Não tem uma senha? <b onclick="switchTab('register')">Criar senha</b>
    </div>
  </div>

  <script src="db.js"></script>
  <script>
    // Mantendo sua funcionalidade original
    function switchTab(t){
      document.getElementById('tab-login').classList.toggle('active',t==='login');
      document.getElementById('tab-register').classList.toggle('active',t==='register');
      document.getElementById('form-login').style.display=t==='login'?'block':'none';
      document.getElementById('form-register').style.display=t==='register'?'block':'none';
    }

    function showMsg(id,text,type){
      const el = document.getElementById(id);
      el.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    function doLogin(){
      const user=document.getElementById('login-user').value.trim();
      const pass=document.getElementById('login-pass').value;
      if(!user||!pass) return showMsg('login-msg','Preencha todos os campos.','error');
      
      const users=DB.getUsers();
      const found=users.find(u=>u.username===user);
      if(!found) return showMsg('login-msg','Usuário não encontrado.','error');
      if(found.password!==btoa(pass)) return showMsg('login-msg','Senha incorreta.','error');
      
      localStorage.setItem('bloom_session',JSON.stringify({username:user,name:found.name}));
      showMsg('login-msg','Sucesso! Entrando...','success');
      setTimeout(()=>window.location.href='app.html',800);
    }

    function doRegister(){
      const name=document.getElementById('reg-name').value.trim();
      const user=document.getElementById('reg-user').value.trim().toLowerCase();
      const pass=document.getElementById('reg-pass').value;
      
      if(!name||!user||!pass) return showMsg('reg-msg','Preencha os campos.','error');
      if(pass.length<6) return showMsg('reg-msg','Senha curta demais.','error');
      
      const users=DB.getUsers();
      if(users.find(u=>u.username===user)) return showMsg('reg-msg','E-mail já cadastrado.','error');
      
      DB.addUser({username:user,name,password:btoa(pass),createdAt:Date.now()});
      showMsg('reg-msg','Agente criado! Redirecionando...','success');
      setTimeout(()=>switchTab('login'), 1000);
    }
  </script>
</body>
</html>
