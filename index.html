<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #000000;
      --text-muted: #666666;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --border-color: rgba(255, 255, 255, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      /* Gradiente animado de fundo */
      background: linear-gradient(-45deg, #fce4ec, #fff9c4, #e1f5fe, #f3e5f5);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Feixe de luz passando ao fundo */
    .light-beam {
      position: absolute;
      width: 200%;
      height: 100px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: rotate(-45deg);
      top: -50%;
      left: -100%;
      animation: beamMove 8s infinite linear;
      z-index: 0;
    }

    @keyframes beamMove {
      0% { transform: translate(-100%, -100%) rotate(-45deg); }
      100% { transform: translate(150%, 150%) rotate(-45deg); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .sub-logo {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .tab {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      padding-bottom: 4px;
      transition: 0.3s;
    }

    .tab.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
    }

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }

    .inp {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    .inp:focus {
      background: white;
      border-color: var(--primary);
    }

    .btn-primary {
      width: 100%;
      background: #e0e0e0; /* Cor neutra como no screenshot */
      color: #333;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background: #d4d4d4;
    }

    .divider {
      margin: 20px 0;
      font-size: 12px;
      color: #999;
      display: flex;
      align-items: center;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.05);
      margin: 0 10px;
    }

    .msg { font-size: 13px; margin-bottom: 10px; }
    .error { color: #d93025; }
    .success { color: #188038; }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="light-beam"></div>

  <div class="wrapper">
    <div class="card">
      <div class="logo">Operamind</div>
      <p class="sub-logo">Entre na sua conta para continuar</p>

      <div class="tabs">
        <span class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</span>
        <span class="tab" id="tab-register" onclick="switchTab('register')">Cadastrar</span>
      </div>

      <div id="form-login">
        <div class="form-group">
          <label>Usuário</label>
          <input class="inp" id="login-user" type="text" placeholder="seu_usuario">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input class="inp" id="login-pass" type="password" placeholder="••••••••">
        </div>
        <div id="login-msg"></div>
        <button class="btn-primary" onclick="doLogin()">Entrar</button>
      </div>

      <div id="form-register" style="display:none">
        <div class="form-group">
          <label>Nome Completo</label>
          <input class="inp" id="reg-name" type="text" placeholder="Como te chamamos?">
        </div>
        <div class="form-group">
          <label>Usuário</label>
          <input class="inp" id="reg-user" type="text" placeholder="usuario_unico">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input class="inp" id="reg-pass" type="password" placeholder="Mínimo 6 caracteres">
        </div>
        <div id="reg-msg"></div>
        <button class="btn-primary" onclick="doRegister()">Criar conta</button>
      </div>

      <div class="divider">ou</div>
      
      <p style="font-size: 13px; color: #666;">
        Ainda não tem acesso? <a href="#" style="color: #000; font-weight: 600; text-decoration: none;" onclick="switchTab('register')">Criar senha</a>
      </p>
    </div>

    <div class="footer">
      <p>Operamind · 2026</p>
    </div>
  </div>

  <script src="db.js"></script>
  <script>
    function switchTab(t){
      document.getElementById('tab-login').classList.toggle('active',t==='login');
      document.getElementById('tab-register').classList.toggle('active',t==='register');
      document.getElementById('form-login').style.display=t==='login'?'block':'none';
      document.getElementById('form-register').style.display=t==='register'?'block':'none';
    }

    function showMsg(id,text,type){
      const el = document.getElementById(id);
      el.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    // A lógica de doLogin e doRegister permanece a mesma do seu código original
    function doLogin(){
      const user=document.getElementById('login-user').value.trim();
      const pass=document.getElementById('login-pass').value;
      if(!user||!pass) return showMsg('login-msg','Preencha os campos.','error');
      
      const users=DB.getUsers();
      const found=users.find(u=>u.username===user);
      if(!found) return showMsg('login-msg','Usuário não encontrado.','error');
      if(found.password!==btoa(pass)) return showMsg('login-msg','Senha incorreta.','error');
      
      localStorage.setItem('bloom_session',JSON.stringify({username:user, name:found.name, blooms:found.blooms||0, xp:found.xp||0}));
      showMsg('login-msg','Entrando...','success');
      setTimeout(()=>window.location.href='app.html',800);
    }

    function doRegister(){
      const name=document.getElementById('reg-name').value.trim();
      const user=document.getElementById('reg-user').value.trim().toLowerCase();
      const pass=document.getElementById('reg-pass').value;
      
      if(!name||!user||!pass) return showMsg('reg-msg','Preencha todos os campos.','error');
      if(pass.length<6) return showMsg('reg-msg','Senha muito curta.','error');
      
      const users=DB.getUsers();
      if(users.find(u=>u.username===user)) return showMsg('reg-msg','Usuário já existe.','error');
      
      DB.addUser({username:user, name, password:btoa(pass), createdAt:Date.now(), blooms:0, xp:0});
      localStorage.setItem('bloom_session',JSON.stringify({username:user, name, blooms:0, xp:0}));
      showMsg('reg-msg','Conta criada!','success');
      setTimeout(()=>window.location.href='app.html',800);
    }
  </script>
</body>
</html>
