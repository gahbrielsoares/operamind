<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind | Torne-se 1% mais inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #ffffff;
      --text-main: #000000;
      --text-muted: #555555;
      --accent: #FFC017; /* Amarelo The News */
      --border: #e6e6e6;
      --error: #d93025;
      --success: #188038;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Barra de topo estilo newsletter */
    .top-bar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 5px;
      background: var(--accent);
      z-index: 10;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 40px 20px;
      text-align: center;
    }

    /* Logo e Header */
    .header-block {
      margin-bottom: 48px;
    }

    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 18px;
      color: var(--text-muted);
      line-height: 1.4;
      font-weight: 400;
    }

    .tagline strong {
      color: var(--text-main);
      font-weight: 700;
    }

    /* Card de formulário simplificado */
    .form-container {
      width: 100%;
      text-align: left;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 32px;
    }

    .tab {
      padding: 12px 0;
      margin-right: 24px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .tab.active {
      color: var(--text-main);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--text-main);
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .inp {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 14px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }

    .inp:focus {
      border-color: var(--text-main);
    }

    /* Botão estilo The News */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--text-main);
      color: #fff;
      border: none;
      border-radius: 50px; /* Botão bem arredondado */
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.1s, opacity 0.2s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-ghost {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid var(--text-main);
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      cursor: pointer;
      margin-top: 24px;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
    }

    .msg {
      font-size: 14px;
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      font-weight: 500;
    }
    .msg.error { color: var(--error); background: #fce8e6; }
    .msg.success { color: var(--success); background: #e6f4ea; }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 20px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="wrapper">
    <header class="header-block">
      <h1 class="logo-main">Operamind</h1>
      <p class="tagline">Você <strong>1% mais inteligente</strong> todos os dias através da IA e Taxonomia de Bloom.</p>
    </header>

    <div class="form-container">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Cadastrar</div>
      </div>

      <div id="form-login">
        <div class="field">
          <label>Usuário</label>
          <input class="inp" id="login-user" type="text" placeholder="ex: gabriel_ia"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input class="inp" id="login-pass" type="password" placeholder="Sua senha secreta" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <div id="login-msg"></div>
        <button class="btn-primary" onclick="doLogin()">INICIAR MISSÃO →</button>
      </div>

      <div id="form-register" style="display:none">
        <div class="field">
          <label>Nome Completo</label>
          <input class="inp" id="reg-name" type="text" placeholder="Como quer ser chamado?"/>
        </div>
        <div class="field">
          <label>Nome de Usuário</label>
          <input class="inp" id="reg-user" type="text" placeholder="usuario_unico"/>
        </div>
        <div class="field">
          <label>Sua Senha</label>
          <input class="inp" id="reg-pass" type="password" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()"/>
        </div>
        <div id="reg-msg"></div>
        <button class="btn-primary" onclick="doRegister()">CRIAR MINHA CONTA</button>
      </div>

      <div class="divider">OU</div>
      <a href="analytics.html" class="btn-ghost">ACESSAR ANÁLISE PÚBLICA</a>
    </div>

    <footer class="footer">
      <p>Operamind · 2026</p>
      <p style="margin-top: 5px; opacity: 0.7;">Baseado em Soares, G.J.S. (2025) - Adaptive Learning</p>
    </footer>
  </div>

  <script src="db.js"></script>
  <script>
    function switchTab(t){
      document.getElementById('tab-login').classList.toggle('active',t==='login');
      document.getElementById('tab-register').classList.toggle('active',t==='register');
      document.getElementById('form-login').style.display=t==='login'?'block':'none';
      document.getElementById('form-register').style.display=t==='register'?'block':'none';
    }

    function showMsg(id,text,type){
      document.getElementById(id).innerHTML=`<div class="msg ${type}">${text}</div>`;
    }

    function doLogin(){
      const user=document.getElementById('login-user').value.trim();
      const pass=document.getElementById('login-pass').value;
      if(!user||!pass) return showMsg('login-msg','Preencha todos os campos.','error');
      
      const users=DB.getUsers();
      const found=users.find(u=>u.username===user);
      if(!found) return showMsg('login-msg','Usuário não encontrado.','error');
      if(found.password!==btoa(pass)) return showMsg('login-msg','Senha incorreta.','error');
      
      localStorage.setItem('bloom_session',JSON.stringify({
        username:user,
        name:found.name,
        blooms:found.blooms||0,
        xp:found.xp||0
      }));
      
      showMsg('login-msg','Bem-vindo de volta. Carregando...','success');
      setTimeout(()=>window.location.href='app.html',800);
    }

    function doRegister(){
      const name=document.getElementById('reg-name').value.trim();
      const user=document.getElementById('reg-user').value.trim().toLowerCase().replace(/\s+/g,'');
      const pass=document.getElementById('reg-pass').value;
      
      if(!name||!user||!pass) return showMsg('reg-msg','Preencha todos os campos.','error');
      if(pass.length<6) return showMsg('reg-msg','Senha deve ter ao menos 6 caracteres.','error');
      
      const users=DB.getUsers();
      if(users.find(u=>u.username===user)) return showMsg('reg-msg','Usuário já existe.','error');
      
      DB.addUser({
        username:user,
        name,
        password:btoa(pass),
        createdAt:Date.now(),
        blooms:0,
        xp:0
      });
      
      localStorage.setItem('bloom_session',JSON.stringify({username:user,name,blooms:0,xp:0}));
      showMsg('reg-msg','Conta criada com sucesso!','success');
      setTimeout(()=>window.location.href='app.html',800);
    }
  </script>
</body>
</html>
