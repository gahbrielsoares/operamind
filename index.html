<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind | Adaptive Learning</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Paleta Neo-Editorial */
      --bg-base: #FDFCF8;
      --accent-pink: #FF85A2;
      --accent-soft: #F4EBE2;
      --deep-black: #1A1A1A;
      --glass-white: rgba(255, 255, 255, 0.45);
      --text-main: #2D2D2D;
      --text-muted: #666666;
      --border-glass: rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* 2. Fundo e Atmosfera Dinâmica (Background) */
    .bg-dynamic {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 10% 10%, #FFEBEE 0%, transparent 40%),
                  radial-gradient(circle at 90% 90%, #F3E5F5 0%, transparent 40%);
    }

    /* Feixe de Luz Diagonal */
    .bg-dynamic::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 200px;
      background: linear-gradient(90deg, transparent, rgba(255, 133, 162, 0.05), transparent);
      transform: rotate(-35deg) translateY(-20%);
      top: 0;
      left: -25%;
      filter: blur(80px);
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    /* 4. Tipografia Editorial */
    .logo-block {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-city {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--accent-pink);
      margin-bottom: 8px;
    }

    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 900;
      color: var(--deep-black);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 10px;
    }

    /* 3. Efeito Glassmorphism (Card) */
    .card {
      background: var(--glass-white);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 24px;
      border: 1px solid var(--border-glass);
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04), 
                  inset 0 0 20px rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden; /* Para o shimmer */
    }

    /* Shimmer Effect Animation */
    .card::after {
      content: "";
      position: absolute;
      top: -150%;
      left: -150%;
      width: 300%;
      height: 300%;
      background: linear-gradient(
        45deg,
        transparent 45%,
        rgba(255, 255, 255, 0.1) 50%,
        transparent 55%
      );
      animation: shimmer 8s infinite linear;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50%, 50%); }
    }

    /* 5. Componentes e Inputs */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      margin-bottom: 32px;
      gap: 24px;
    }

    .tab {
      padding-bottom: 12px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
    }

    .tab.active {
      color: var(--deep-black);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--deep-black);
    }

    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--deep-black);
      margin-bottom: 8px;
    }

    .inp {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      transition: all 0.3s;
    }

    .inp:focus {
      outline: none;
      background: #fff;
      border-color: var(--accent-pink);
      box-shadow: 0 4px 12px rgba(255, 133, 162, 0.1);
    }

    /* Botão Principal */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--deep-black);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      margin-top: 10px;
    }

    .btn-primary:hover {
      background: #333;
      transform: translateY(-1px);
    }

    /* Botões Sociais/Ghost */
    .btn-ghost {
      width: 100%;
      padding: 14px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 12px;
      color: var(--text-main);
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .btn-ghost:hover {
      background: #fff;
      border-color: rgba(0,0,0,0.1);
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(0,0,0,0.06);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .footer-note {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'Lora', serif;
      line-height: 1.6;
    }

    /* Mensagens Feedback */
    .msg { font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 8px; font-weight: 500; }
    .msg.error { background: #FFF0F0; color: #D32F2F; border: 1px solid #FFCDD2; }
    .msg.success { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }
  </style>
</head>
<body>
  <div class="bg-dynamic"></div>

  <div class="wrapper">
    <header class="logo-block">
      <div class="logo-city">Adaptive Learning</div>
      <h1 class="logo-main">Operamind</h1>
      <p class="logo-sub">Taxonomia de Bloom & IA Generativa</p>
    </header>

    <main class="card">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Assinar</div>
      </div>

      <div id="form-login">
        <div class="field">
          <label>Usuário de Acesso</label>
          <input class="inp" id="login-user" type="text" placeholder="ex: jorge_soares" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Senha Editorial</label>
          <input class="inp" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <div id="login-msg"></div>
        <button class="btn-primary" onclick="doLogin()">Iniciar Leitura</button>
      </div>

      <div id="form-register" style="display:none">
        <div class="field">
          <label>Nome Completo</label>
          <input class="inp" id="reg-name" type="text" placeholder="Como deseja ser chamado?"/>
        </div>
        <div class="field">
          <label>Username</label>
          <input class="inp" id="reg-user" type="text" placeholder="usuario_unico"/>
        </div>
        <div class="field">
          <label>Senha de Segurança</label>
          <input class="inp" id="reg-pass" type="password" placeholder="mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()"/>
        </div>
        <div id="reg-msg"></div>
        <button class="btn-primary" onclick="doRegister()">Criar Conta Premium</button>
      </div>

      <div class="divider">ou</div>
      
      <a href="analytics.html" style="text-decoration: none;">
        <button class="btn-ghost">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
          Acessar Painel Analítico
        </button>
      </a>
    </main>

    <footer class="footer-note">
      Operamind · <strong>Edição 2025</strong><br>
      Baseado na Taxonomia Revisada de Bloom
    </footer>
  </div>

  <script src="db.js"></script>
  <script>
    function switchTab(t){
      document.getElementById('tab-login').classList.toggle('active',t==='login');
      document.getElementById('tab-register').classList.toggle('active',t==='register');
      document.getElementById('form-login').style.display=t==='login'?'block':'none';
      document.getElementById('form-register').style.display=t==='register'?'block':'none';
    }
    function showMsg(id,text,type){document.getElementById(id).innerHTML=`<div class="msg ${type}">${text}</div>`;}
    
    function doLogin(){
      const user=document.getElementById('login-user').value.trim();
      const pass=document.getElementById('login-pass').value;
      if(!user||!pass)return showMsg('login-msg','Preencha todos os campos.','error');
      
      // Simulação do DB conforme seu código original
      if(typeof DB !== 'undefined') {
          const users=DB.getUsers();
          const found=users.find(u=>u.username===user);
          if(!found)return showMsg('login-msg','Usuário não encontrado.','error');
          if(found.password!==btoa(pass))return showMsg('login-msg','Senha incorreta.','error');
          localStorage.setItem('bloom_session',JSON.stringify({username:user,name:found.name}));
          showMsg('login-msg','Acesso autorizado.','success');
          setTimeout(()=>window.location.href='app.html',800);
      } else {
          showMsg('login-msg','Erro: DB não carregado.','error');
      }
    }

    function doRegister(){
      const name=document.getElementById('reg-name').value.trim();
      const user=document.getElementById('reg-user').value.trim().toLowerCase();
      const pass=document.getElementById('reg-pass').value;
      if(!name||!user||!pass)return showMsg('reg-msg','Campos obrigatórios.','error');
      if(pass.length<6)return showMsg('reg-msg','Senha muito curta.','error');
      
      if(typeof DB !== 'undefined') {
          DB.addUser({username:user,name,password:btoa(pass)});
          showMsg('reg-msg','Conta criada com sucesso!','success');
          setTimeout(()=>switchTab('login'), 1000);
      }
    }
  </script>
</body>
</html>
