<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operamind — Análise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    :root {
      --color-orange-soft: #ffb380;
      --color-blue-deep: #0088cc;
      --color-pink-pastel: #ffcade;
      --glass-bg: rgba(255, 255, 255, 0.02);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020205;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* SISTEMA DE BOLHAS VIVAS */
    .bg-bubbles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      filter: blur(80px);
    }
    .bubble {
      position: absolute;
      background: var(--color-orange-soft);
      border-radius: 50%;
      opacity: 0.3;
      animation: floatBubble 15s infinite ease-in-out;
    }
    .bubble:nth-child(1) { width: 800px; height: 800px; left: -10%; top: -10%; background: var(--color-blue-deep); animation-duration: 20s; }
    .bubble:nth-child(2) { width: 600px; height: 600px; right: -5%; bottom: -5%; background: var(--color-pink-pastel); animation-duration: 25s; animation-delay: -5s; }
    .bubble:nth-child(3) { width: 500px; height: 500px; left: 30%; top: 40%; background: var(--color-orange-soft); animation-duration: 30s; animation-delay: -2s; }

    @keyframes floatBubble {
      0%, 100% { transform: translate(0, 0) scale(1); border-radius: 50%; }
      33% { transform: translate(100px, -100px) scale(1.1); border-radius: 40% 60% 70% 30%; }
      66% { transform: translate(-50px, 150px) scale(0.9); border-radius: 60% 40% 30% 70%; }
    }

    /* NAVEGAÇÃO */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 80px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-main { font-weight: 800; font-size: 24px; letter-spacing: -1px; }
    .nav-sub { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-left: 10px; }
    
    .btn-back {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff; padding: 10px 20px; border-radius: 12px;
      cursor: pointer; transition: 0.3s; text-decoration: none; font-size: 13px;
    }
    .btn-back:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

    /* CARDS GLASSMORPISM */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    /* SEARCH BAR */
    .search-bar { display: flex; gap: 15px; align-items: center; }
    .inp {
      flex: 1; padding: 15px 20px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 15px;
      color: #fff; outline: none; transition: 0.4s;
    }
    .inp:focus { border-color: var(--color-blue-deep); background: rgba(255,255,255,0.08); }

    /* KPI GRID */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .kpi-card { text-align: center; padding: 25px; position: relative; overflow: hidden; }
    .kpi-val { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
    .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

    /* CHARTS */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .chart-wide { grid-column: 1 / -1; }
    .chart-container { height: 300px; position: relative; margin-top: 20px; }
    .section-title { font-weight: 800; font-size: 20px; margin: 40px 0 20px; letter-spacing: -0.5px; }

    /* TABLES */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.05); }
    td { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .tag-bloom { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    
    /* PROGRESS BAR */
    .progress-bg { width: 60px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 10px; }

    @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="bg-bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<nav>
  <div>
    <span class="logo-main">Operamind</span>
    <span class="nav-sub">Análise Pública</span>
  </div>
  <a href="index.html" class="btn-back">← Voltar</a>
</nav>

<div class="container">
  
  <div class="glass-card search-bar">
    <input class="inp" id="topic-search" type="text" placeholder="Filtrar por tema (ex: Álgebra, Biologia...)" oninput="filterByTopic(this.value)"/>
    <button id="btn-clear" onclick="clearFilter()" style="display:none; background:none; border:none; color:var(--color-pink-pastel); cursor:pointer; font-weight:600;">Limpar</button>
    <span id="filter-label" style="font-size:12px; color:var(--muted)"></span>
  </div>

  <div class="kpi-grid" id="kpi-grid"></div>

  <h2 class="section-title">Cognição & Volume</h2>
  <div class="charts-row">
    <div class="glass-card">
      <div style="font-size:13px; font-weight:600; color:var(--color-blue-deep)">Taxonomia de Bloom</div>
      <div class="chart-container">
        <canvas id="chart-levels"></canvas>
      </div>
    </div>
    <div class="glass-card">
      <div style="font-size:13px; font-weight:600; color:var(--color-pink-pastel)">Distribuição de Temas</div>
      <div class="chart-container">
        <canvas id="chart-topics"></canvas>
      </div>
    </div>
    <div class="glass-card chart-wide">
      <div style="font-size:13px; font-weight:600; color:var(--color-orange-soft)">Correlação Prática vs Acerto</div>
      <div class="chart-container" style="height:200px">
        <canvas id="chart-scatter"></canvas>
      </div>
    </div>
  </div>

  <h2 class="section-title">Comparativo de Temas</h2>
  <div class="kpi-grid" id="compare-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr))"></div>

  <h2 class="section-title">Agentes em Campo</h2>
  <div class="glass-card table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Agente</th>
          <th>Tema</th>
          <th>Nível Bloom</th>
          <th>Acertos</th>
          <th>Taxa</th>
          <th>BKT</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty-state" style="display:none; text-align:center; padding:40px; color:var(--muted)">Nenhuma sessão encontrada.</div>
  </div>

</div>

<script src="db.js"></script>
<script src="bloom.js"></script>
<script>
// MANTENDO TODA A SUA LÓGICA ORIGINAL
let allSessions=[];
let filtered=[];
let chartLevels=null, chartTopics=null, chartScatter=null;

Chart.defaults.color = 'rgba(255,255,255,0.5)';
Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';

window.addEventListener('DOMContentLoaded',()=>{
  allSessions=DB.getSessions();
  filtered=allSessions;
  renderAll();
});

function filterByTopic(q){
  const s=q.trim().toLowerCase();
  document.getElementById('btn-clear').style.display=s?'inline-block':'none';
  filtered=s?allSessions.filter(s2=>s2.topic?.toLowerCase().includes(s)):allSessions;
  document.getElementById('filter-label').textContent=s?`${filtered.length} sessões`:'';
  renderAll();
}

function clearFilter(){
  document.getElementById('topic-search').value='';
  filterByTopic('');
}

function renderAll(){renderKPIs(); renderCharts(); renderCompare(); renderTable();}

function renderKPIs(){
  let correct=0, wrong=0;
  filtered.forEach(s=>(s.attempts||[]).forEach(a=>a.correct?correct++:wrong++));
  const total=correct+wrong;
  const acc=total>0?Math.round(correct/total*100):0;
  
  const kpis=[
    {v:filtered.length, l:'Sessões', c:'var(--color-blue-deep)'},
    {v:acc+'%', l:'Precisão', c:'var(--color-pink-pastel)'},
    {v:total, l:'Tentativas', c:'#fff'},
    {v:new Set(filtered.map(s=>s.topic)).size, l:'Temas', c:'var(--color-orange-soft)'}
  ];

  document.getElementById('kpi-grid').innerHTML=kpis.map(k=>`
    <div class="glass-card kpi-card">
      <div class="kpi-val" style="color:${k.c}">${k.v}</div>
      <div class="kpi-label">${k.l}</div>
    </div>`).join('');
}

function renderCharts(){
  const stats=DB.getLevelStats(filtered);
  const levels=BLOOM.levels;
  
  if(chartLevels) chartLevels.destroy();
  chartLevels=new Chart(document.getElementById('chart-levels'),{
    type:'bar',
    data:{
      labels:levels,
      datasets:[
        {label:'Acertos', data:levels.map(l=>stats[l]?.correct||0), backgroundColor:'#ffcade', borderRadius:5},
        {label:'Erros', data:levels.map(l=>stats[l]?.wrong||0), backgroundColor:'rgba(255,255,255,0.1)', borderRadius:5}
      ]
    },
    options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
  });

  const topicCounts={};
  filtered.forEach(s=>{if(s.topic) topicCounts[s.topic]=(topicCounts[s.topic]||0)+1;});
  const entries=Object.entries(topicCounts).slice(0,5);

  if(chartTopics) chartTopics.destroy();
  chartTopics=new Chart(document.getElementById('chart-topics'),{
    type:'doughnut',
    data:{
      labels:entries.map(e=>e[0]),
      datasets:[{data:entries.map(e=>e[1]), backgroundColor:['#ffb380','#0088cc','#ffcade','#ffffff','#444'], borderWidth:0}]
    },
    options:{ maintainAspectRatio:false, cutout:'70%'}
  });

  const scatterData=filtered.map(s=>{
    const c=(s.attempts||[]).filter(a=>a.correct).length;
    return {x: (s.attempts||[]).length, y: Math.round(c/(s.attempts?.length||1)*100)};
  });

  if(chartScatter) chartScatter.destroy();
  chartScatter=new Chart(document.getElementById('chart-scatter'),{
    type:'scatter',
    data:{ datasets:[{label:'Agentes', data:scatterData, backgroundColor:'#0088cc'}] },
    options:{ maintainAspectRatio:false, scales:{y:{max:100, min:0}} }
  });
}

function renderCompare(){
  // Simplificado para o grid de cards glass
  const topics={};
  filtered.forEach(s=>{ if(s.topic) topics[s.topic]=(topics[s.topic]||0)+1; });
  document.getElementById('compare-grid').innerHTML=Object.entries(topics).map(([t,v])=>`
    <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center">
      <span style="font-weight:600; font-size:14px">${t}</span>
      <span style="color:var(--color-blue-deep); font-weight:800">${v} sessões</span>
    </div>
  `).join('');
}

function renderTable(){
  const tbody=document.getElementById('tbody');
  if(filtered.length===0){ tbody.innerHTML=''; document.getElementById('empty-state').style.display='block'; return; }
  document.getElementById('empty-state').style.display='none';

  tbody.innerHTML=filtered.sort((a,b)=>b.startedAt-a.startedAt).map(s=>{
    const c=(s.attempts||[]).filter(a=>a.correct).length;
    const rate=Math.round(c/(s.attempts?.length||1)*100);
    const bloomColor=BLOOM.colors[s.finalBloomLevel] || {bg:'rgba(255,255,255,0.1)', text:'#fff'};
    
    return `<tr>
      <td style="font-weight:600">${s.name||s.username}</td>
      <td style="color:var(--muted)">${s.topic||'—'}</td>
      <td><span class="tag-bloom" style="background:${bloomColor.bg}; color:${bloomColor.text}">${s.finalBloomLevel||'Iniciante'}</span></td>
      <td style="font-weight:800">${c}</td>
      <td>
        <div style="display:flex; align-items:center; gap:10px">
          <div class="progress-bg"><div class="progress-fill" style="width:${rate}%; background:var(--color-blue-deep)"></div></div>
          <span>${rate}%</span>
        </div>
      </td>
      <td style="color:var(--color-orange-soft); font-weight:600">${s.bkt||0}%</td>
      <td style="font-size:11px; color:var(--muted)">${new Date(s.startedAt).toLocaleDateString()}</td>
    </tr>`;
  }).join('');
}
</script>

</body>
</html>
